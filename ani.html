<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anniversary Gift Options</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, serif;
      background: linear-gradient(135deg, #fff0f3, #ffe4ec, #f8d7da);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a1f2b;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.75);
      padding: 40px 30px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(120, 40, 60, 0.2);
      max-width: 500px;
      width: 90%;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    .heart {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    a {
      text-decoration: none;
    }

    .gift-btn {
      display: block;
      padding: 16px;
      border-radius: 30px;
      background: #b84a62;
      color: white;
      font-size: 1.05rem;
      font-weight: bold;
      transition: 0.25s ease;
      box-shadow: 0 5px 15px rgba(184, 74, 98, 0.3);
    }

    .gift-btn:hover {
      background: #8f2f46;
      transform: translateY(-3px);
    }

    footer {
      margin-top: 25px;
      font-size: 0.9rem;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="heart">❤️</div>
    <h1>Happy Anniversary</h1>
    <p>Pick one gift option below. Each one has a little surprise attached.</p>

    <div class="buttons">
      <a href="#" target="_blank">
        <span class="gift-btn">Gift Option 1</span>
      </a>

      <a href="#" target="_blank">
        <span class="gift-btn">Gift Option 2</span>
      </a>

      <a href="#" target="_blank">
        <span class="gift-btn">Gift Option 3</span>
      </a>
    </div>

    <footer>Made with love 💌</footer>
  </div>
</body>
</html>
